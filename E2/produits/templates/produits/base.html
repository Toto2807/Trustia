<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Trustia</title>
        <style>
            body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
            h1   { color: #333; }
            table { width: 100%; border-collapse: collapse; background: white; }
            th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
            th { background: #4a90d9; color: white; }
            a  { color: #4a90d9; text-decoration: none; }
            a:hover { text-decoration: underline; }
            .btn { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
            .btn-blue   { background: #4a90d9; color: white; }
            .btn-red    { background: #e74c3c; color: white; }
            .btn-green  { background: #2ecc71; color: white; }
            .nav { margin-bottom: 30px; }
            .nav a { margin-right: 20px; font-weight: bold; }
            .pagination { margin-top: 20px; }
            .pagination a, .pagination span { margin-right: 8px; }
        </style>
    </head>
    <body>
        <div class="nav">
            <a href="{% url 'liste_produits' %}">🛒 Produits</a>
            <a href="{% url 'liste_factures' %}">🧾 Factures</a>
            <a href="{% url 'creer_produit' %}">+ Nouveau produit</a>
            <a href="{% url 'creer_facture' %}">+ Nouvelle facture</a>
        </div>
        {% block contenu %}{% endblock %}
    </body>
</html>
